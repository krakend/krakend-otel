volumes:
  vol_tempo:
  vol_grafana:
services:
  krakend_front:
    domainname: krakend_front
    image: krakend-otel-example:latest
    volumes:
      - "./conf/krakend_front:/etc/krakend"
    ports:
      - "44444:44444"
      - "9091:9090"
  krakend_middle:
    domainname: krakend_middle
    image: krakend-otel-example:latest
    volumes:
      - "./conf/krakend_middle:/etc/krakend"
    ports:
      - "44445:44445"
      - "9092:9090"
  krakend_back:
    domainname: krakend_back
    image: krakend-otel-example:latest
    volumes:
      - "./conf/krakend_back:/etc/krakend"
    ports:
      - "44446:44446"
      - "9093:9090"
  loki:
    image: grafana/loki:latest
    domainname: loki
    healthcheck:
      test: [CMD, wget, --spicer, -S, http://localhost:3100/ready]
    ports:
      - "3100:3100"
  tempo:
    image: grafana/tempo:latest
    domainname: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - "./conf/tempo/tempo.yaml:/etc/tempo.yaml"
      - "vol_tempo:/tmp/tempo"
    ports:
      - "14268:14268"   # jaeger ingest
      - "3200:3200"     # tempo
      - "9095:9095"     # tempo grpc
      - "4317:4317"     # otlp grpc
      - "4318:4318"     # otlp http
      - "9411:9411"     # zipkin
  prometheus:
    image: prom/prometheus:latest
    domainname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - "./conf/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
    depends_on:
      - krakend_front
      - krakend_middle
      - krakend_back
  grafana:
    image: grafana/grafana:latest
    domainname: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: krakend
      GF_SECURITY_ADMIN_PASSWORD: krakend
      GF_AUT_ANONYMOUS_ENABLED: "true"
    volumes:
      - "vol_grafana:/var/lib/grafana"
    depends_on:
      - prometheus
      - loki
      - tempo
#  collector:
#    image: otel/opentelemetry-collector:latest
#    ports:
#      - "4317:4317"   # this port conflicts with the one already exposed by tempo
#      - "55679:55679"
  jaeger:
    image: jaegertracing/all-in-one:1.52
    domainname: jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    ports:
      # - 6831:6831/udp # accept jaeger.thrift over Thrift-compact protocol
      # - 6832:6832/udp # accept jaeger.thrift over Thrift-binary protocol
      - "5778:5778" # serve configs 
      - "16686:16686" # serve frontend UI
      # - 4317:4317 # otlp grpc
      # - 4318:4318 # otlp http
      - "5317:4317"   # otlp grpc: we remap this to be able to run other envs
      - "5318:4318"   # otlp http: we reamp this to be able to run other envs
      # - 14250:14250 # accept `model.proto`
      # - 14268:14268 # jaeger ingest
      # - 14269:14269 #
      # - 9411:9411   # zipkin
